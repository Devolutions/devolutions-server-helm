{{- if .Values.httproute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "devolutions-server.fullname" . }}-https
  labels:
    {{- include "devolutions-server.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.httproute.gateway.name }}
      namespace: {{ .Values.httproute.gateway.namespace }}
      {{- if .Values.httproute.gateway.sectionName }}
      sectionName: {{ .Values.httproute.gateway.sectionName }}
      {{- end }}
  hostnames:
    - {{ include "devolutions-server.hostname" . }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "devolutions-server.fullname" . }}
          port: {{ .Values.service.port }}
          weight: 100
{{- end }}
